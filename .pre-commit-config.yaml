repos:
  - repo: local
    hooks:
      - id: backend-mock-boundary
        name: backend mock boundary
        entry: uv run python scripts/check_backend_mock_boundary.py
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        pass_filenames: false
